{% extends "base.html" %}



{% block content %}



<div class="d-flex justify-content-between">


<h2>
Doctors
</h2>


<a href="/doctors/add"
class="btn-primary">

+ Add Doctor

</a>


</div>




<div class="card-box">


<table class="table table-hover">


<thead>


<tr>

<th>ID</th>

<th>Name</th>

<th>Specialization</th>

<th>Qualification</th>

<th>Experience</th>

<th>Phone</th>

<th>Email</th>


</tr>


</thead>



<tbody>


{% for d in doctors %}


<tr>


<td>
{{d.id}}
</td>


<td>
{{d.name}}
</td>


<td>
{{d.specialization}}
</td>


<td>
{{d.qualification}}
</td>


<td>
{{d.experience}} Years
</td>


<td>
{{d.phone}}
</td>


<td>
{{d.email}}
</td>


</tr>


{% endfor %}



</tbody>



</table>


</div>



{% endblock %}
