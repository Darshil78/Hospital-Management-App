{% extends "base.html" %}


{% block content %}


<div class="container-fluid">


<div class="d-flex justify-content-between align-items-center">

<h2 class="page-title">
Patients
</h2>


<a href="/patients/add" class="btn-primary">

+ Add Patient

</a>

</div>



<div class="card-box">


<table class="table table-hover">


<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Age</th>

<th>Gender</th>

<th>Blood Group</th>

<th>Phone</th>

<th>Disease</th>

<th>Action</th>

<th>Medicine</th>


</tr>

</thead>



<tbody>


{% for p in patients %}


<tr>


<td>
{{p.id}}
</td>


<td>
{{p.name}}
</td>


<td>
{{p.age}}
</td>


<td>
{{p.gender}}
</td>


<td>
{{p.blood_group}}
</td>


<td>
{{p.phone}}
</td>


<td>
{{p.disease}}
</td>



<td>


<a href="/patients/delete/{{p.id}}"
class="btn btn-danger btn-sm">

Delete

</a>


</td>

<td>

<a href="/recommend-medicine/{{p.id}}"
class="btn btn-success btn-sm">

Recommend Medicine

</a>

</td>


</tr>



{% endfor %}


</tbody>


</table>


</div>



</div>


{% endblock %}
