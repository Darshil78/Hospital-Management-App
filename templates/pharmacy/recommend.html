{% extends "base.html" %}

{% block content %}

<div class="card-box">
    <h3>Recommend Medicine to Patient</h3>
    <p class="text-muted">Create a prescription recommendation for a patient.</p>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Patient</label>
            <select class="form-control" name="patient_id" required>
                <option value="">Select Patient</option>
                {% for patient in patients %}
                <option value="{{ patient.id }}">{{ patient.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Medicine</label>
            <select class="form-control" name="medicine_name" required>
                <option value="">Select Medicine</option>
                {% for medicine in medicines %}
                <option value="{{ medicine.name }}">{{ medicine.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Dosage</label>
            <input type="text" class="form-control" name="dosage" placeholder="e.g. 1 tablet">
        </div>

        <div class="mb-3">
            <label class="form-label">Timing</label>
            <input type="text" class="form-control" name="timing" placeholder="e.g. Twice a day">
        </div>

        <div class="mb-3">
            <label class="form-label">Diagnosis</label>
            <textarea class="form-control" name="diagnosis" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Instructions</label>
            <textarea class="form-control" name="instructions" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" name="date">
        </div>

        <button type="submit" class="btn btn-success">Save Recommendation</button>
        <a href="{{ url_for('pharmacy.index') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
